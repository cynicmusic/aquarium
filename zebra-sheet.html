<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zebra mask — variant sheet</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#07080f; color:#cde; font:11px/1.3 monospace; padding:8px; }
  #top { display:flex; gap:8px; margin-bottom:8px; }
  #top img { height:160px; display:block; }
  #top .p { background:#0b0c14; padding:4px 8px; }
  #top .p div { color:#7bd; font-weight:bold; margin-bottom:4px; }
  #grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:4px; }
  .cell { position:relative; background:#0a0b14; aspect-ratio: 1.5; overflow:hidden; }
  canvas { width:100%; height:100%; display:block; }
  .lbl { position:absolute; top:3px; left:5px; color:#cde; font-size:10px; background:rgba(0,0,0,0.65); padding:2px 5px; border-radius:2px; line-height:1.4; }
  .lbl b { color:#7bd; }
</style>
</head>
<body>
<div id="top">
  <div class="p"><div>MASTER REFERENCE — zebra target</div><img src="/examples/external/cuttle/master reference.png"></div>
  <div class="p"><div>SIDE REF</div><img src="/examples/external/cuttle/shutterstock-2459084889-huge-licensed-scaled-1024x683.jpg"></div>
  <div class="p"><div>critic threshold: 8/10</div></div>
</div>
<div id="grid"></div>
<script type="module" src="/src/workshop/ZebraSheet.js"></script>
</body>
</html>
