<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cuttlefish Variant Sheet</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#07080f; color:#ccd; font:11px/1.3 monospace; }
  #grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:1px; background:#222; }
  .cell { position:relative; background:#07080f; aspect-ratio:1.2; }
  canvas { width:100%; height:100%; display:block; }
  .lbl { position:absolute; top:4px; left:6px; color:#889; font-size:10px; }
  .lbl b { color:#bce; }
</style>
</head>
<body>
<div id="grid"></div>
<script type="module" src="/src/workshop/CuttlefishSheet.js"></script>
</body>
</html>
