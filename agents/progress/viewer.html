<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aquarium Progress Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #ccc; font-family: 'SF Mono', 'Consolas', monospace; padding: 20px; }
  h1 { color: #6cf; margin-bottom: 8px; font-size: 22px; }
  h2 { color: #f93; margin: 24px 0 12px; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 6px; }
  h3 { color: #9f9; margin: 16px 0 8px; font-size: 14px; }
  .subtitle { color: #666; font-size: 12px; margin-bottom: 20px; }
  .grid { display: flex; flex-wrap: wrap; gap: 12px; }
  .card { background: #141428; border: 1px solid #2a2a4a; border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
  .card:hover { border-color: #6cf; }
  .card img { display: block; }
  .card .label { padding: 6px 10px; font-size: 11px; color: #888; }
  .card .score { color: #f93; font-weight: bold; }
  .card.good .score { color: #6f6; }
  .card.bad .score { color: #f66; }
  .section { margin-bottom: 32px; }
  .review-box { background: #141428; border: 1px solid #2a2a4a; border-radius: 8px; padding: 16px; margin: 8px 0; font-size: 12px; line-height: 1.6; max-width: 900px; }
  .review-box table { width: 100%; border-collapse: collapse; }
  .review-box th, .review-box td { padding: 4px 8px; text-align: left; border-bottom: 1px solid #222; }
  .review-box th { color: #6cf; }
  .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 90%; max-height: 90%; }
  .lightbox .close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 30px; cursor: pointer; }
  .status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
  .status.revise { background: #553300; color: #fc3; }
  .status.reject { background: #550000; color: #f66; }
  .status.accept { background: #005500; color: #6f6; }
  .auto-refresh { position: fixed; top: 10px; right: 20px; color: #444; font-size: 11px; }
  #stagnation-alert { display: none; background: #441100; border: 1px solid #883300; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; color: #fa4; font-size: 13px; }
  #stagnation-alert.visible { display: block; }
</style>
</head>
<body>

<h1>Aquarium Fish — Progress Viewer</h1>
<p class="subtitle">Auto-refreshes every 5s. Click any image to enlarge.</p>
<div class="auto-refresh">⟳ watching for changes</div>

<div id="stagnation-alert">
  <strong>⚠ Stagnation Detected:</strong> <span id="stagnation-msg"></span>
</div>

<div class="section">
  <h2>🐟 Fish Geometry (Silhouettes)</h2>
  <div class="grid" id="geometry-grid"></div>
</div>

<div class="section">
  <h2>🎨 Texture Sweeps</h2>
  <div class="grid" id="texture-grid"></div>
</div>

<div class="section">
  <h2>📋 Contact Sheets</h2>
  <div class="grid" id="sheet-grid"></div>
</div>

<div class="section">
  <h2>🐠 Combined (Textured Fish)</h2>
  <div class="grid" id="combined-grid"></div>
</div>

<div class="section">
  <h2>📝 Latest Critic Reviews</h2>
  <div id="reviews"></div>
</div>

<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeLightbox()">×</span>
  <img id="lightbox-img" src="">
</div>

<script>
const BASE = '/output/sprites';
const REVIEW_BASE = '/agents/progress/reviews';

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}
document.getElementById('lightbox').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeLightbox();
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

async function loadImages(dir, gridId, size = 200) {
  const grid = document.getElementById(gridId);
  try {
    const resp = await fetch(dir);
    const html = await resp.text();
    // Parse directory listing for .png files
    const pngMatches = html.match(/href="([^"]+\.png)"/g) || [];
    const files = pngMatches.map(m => m.match(/href="([^"]+)"/)[1]).sort();

    const existing = new Set([...grid.querySelectorAll('.card')].map(c => c.dataset.file));
    const newSet = new Set(files);

    // Remove cards for deleted files
    grid.querySelectorAll('.card').forEach(c => {
      if (!newSet.has(c.dataset.file)) c.remove();
    });

    for (const file of files) {
      if (existing.has(file)) continue;
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.file = file;
      const imgSrc = `${dir}/${file}`;
      const isSweep = file.includes('sweep');
      const displaySize = isSweep ? 400 : size;
      card.innerHTML = `<img src="${imgSrc}" width="${displaySize}" loading="lazy">
        <div class="label">${file.replace('.png','')}</div>`;
      card.onclick = () => openLightbox(imgSrc);
      grid.appendChild(card);
    }
  } catch(e) {
    // Directory might not exist yet
  }
}

async function loadReviews() {
  const container = document.getElementById('reviews');
  try {
    const resp = await fetch('/agents/progress/reviews/');
    const html = await resp.text();
    const mdMatches = html.match(/href="([^"]+\.md)"/g) || [];
    const files = mdMatches.map(m => m.match(/href="([^"]+)"/)[1]).sort().reverse();

    for (const file of files) {
      if (container.querySelector(`[data-file="${file}"]`)) continue;
      const r = await fetch(`/agents/progress/reviews/${file}`);
      const text = await r.text();
      const box = document.createElement('div');
      box.className = 'review-box';
      box.dataset.file = file;
      // Simple markdown rendering
      box.innerHTML = text
        .replace(/^# (.+)/gm, '<h3>$1</h3>')
        .replace(/^## (.+)/gm, '<h3 style="color:#f93">$1</h3>')
        .replace(/^\*\*(.+?)\*\*/gm, '<strong>$1</strong>')
        .replace(/^- (.+)/gm, '• $1<br>')
        .replace(/\| ?(.+?) ?\|/g, (m) => m) // leave tables
        .replace(/\n/g, '<br>');
      container.appendChild(box);
    }
  } catch(e) {}
}

// Stagnation detection
let scoreHistory = [];
function checkStagnation() {
  // Check if scores have been flat for multiple iterations
  const alert = document.getElementById('stagnation-alert');
  const msg = document.getElementById('stagnation-msg');

  if (scoreHistory.length >= 3) {
    const recent = scoreHistory.slice(-3);
    const allSame = recent.every(s => Math.abs(s - recent[0]) < 0.5);
    if (allSame && recent[0] < 7) {
      alert.classList.add('visible');
      msg.textContent = `Scores stuck at ${recent[0].toFixed(1)} for ${recent.length} iterations. Consider: extracting shapes from reference images, trying SVG trace, or using a completely different geometry approach.`;
      return;
    }
  }
  alert.classList.remove('visible');
}

async function refresh() {
  await Promise.all([
    loadImages(`${BASE}/geometry`, 'geometry-grid', 200),
    loadImages(`${BASE}/textures`, 'texture-grid', 300),
    loadImages(`${BASE}/../sheets`, 'sheet-grid', 400),
    loadImages(`${BASE}/combined`, 'combined-grid', 200),
    loadReviews()
  ]);
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
